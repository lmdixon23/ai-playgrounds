name: One-time AI Playgrounds preview refresh

on:
  push:
    paths:
      - .github/workflows/refresh-social-preview.yml

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Pillow
        run: python -m pip install pillow

      - name: Generate image and update metadata
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from PIL import Image, ImageDraw, ImageFont

          W, H = 1200, 630
          sans = '/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf'
          bold = '/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf'

          def font(path, size):
              return ImageFont.truetype(path, size)

          image = Image.new('RGB', (W, H), '#f7f8fb')
          draw = ImageDraw.Draw(image)

          for x in range(0, W + 1, 70):
              draw.line((x, 0, x, H), fill='#e7edf4', width=1)
          for y in range(0, H + 1, 70):
              draw.line((0, y, W, y), fill='#e7edf4', width=1)

          draw.rounded_rectangle((56, 48, 154, 146), radius=22, fill='#0369a1')
          draw.text((105, 97), 'AI', font=font(bold, 32), fill='white', anchor='mm')
          draw.text((56, 182), 'AI Playgrounds', font=font(bold, 66), fill='#172033')
          draw.text((58, 270), 'Move the idea. See what changes.', font=font(bold, 31), fill='#0369a1')
          draw.text((58, 326), 'Twelve bilingual interactives for foundational artificial intelligence', font=font(sans, 23), fill='#607087')

          topics = [
              ('Search', '#bae6fd'), ('Logic', '#ddd6fe'), ('Bayes', '#fef3c7'),
              ('KNN', '#dcfce7'), ('Neural nets', '#fee2e2'), ('Q-learning', '#e0e7ff')
          ]
          x, y = 58, 407
          for label, color in topics:
              width = 165 if label != 'Neural nets' else 205
              draw.rounded_rectangle((x, y, x + width, y + 62), radius=18, fill=color, outline='#cbd5e1', width=2)
              draw.text((x + width / 2, y + 31), label, font=font(bold, 19), fill='#172033', anchor='mm')
              x += width + 15
              if x > 1030:
                  x, y = 58, 486

          draw.rounded_rectangle((845, 60, 1138, 343), radius=24, fill='#ffffff', outline='#dfe5ed', width=3)
          draw.text((991, 91), 'BFS', font=font(bold, 20), fill='#172033', anchor='mm')
          draw.text((991, 127), 'vs', font=font(sans, 16), fill='#607087', anchor='mm')
          draw.text((991, 159), 'A*', font=font(bold, 20), fill='#172033', anchor='mm')

          cell = 22
          ox, oy = 883, 195
          for r in range(5):
              for c in range(9):
                  fill = '#ffffff'
                  if (r, c) in {(0,0), (4,8)}:
                      fill = '#34d399' if (r, c) == (0,0) else '#fb7185'
                  elif c == 4 and r not in {1, 3}:
                      fill = '#475569'
                  elif r == 2 or (r == 3 and c > 4):
                      fill = '#fbbf24'
                  elif c < 5:
                      fill = '#bae6fd'
                  draw.rectangle((ox + c*cell, oy + r*cell, ox + (c+1)*cell, oy + (r+1)*cell), fill=fill, outline='#dfe5ed')

          draw.text((1140, 590), 'lmdixon23.github.io/ai-playgrounds/', font=font(bold, 19), fill='#0369a1', anchor='ra')
          image.save('og-image-v2.png', format='PNG', optimize=True)

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          text = text.replace('https://lmdixon23.github.io/ai-playgrounds/og-image.png', 'https://lmdixon23.github.io/ai-playgrounds/og-image-v2.png')
          old = '<meta property="og:type" content="website"><meta property="og:title" content="AI Playgrounds"><meta property="og:description" content="Twelve bilingual, single-file AI interactives built for classroom use and independent exploration."><meta property="og:image" content="https://lmdixon23.github.io/ai-playgrounds/og-image-v2.png">\n<meta name="twitter:card" content="summary_large_image">'
          new = '<meta property="og:type" content="website"><meta property="og:url" content="https://lmdixon23.github.io/ai-playgrounds/"><meta property="og:title" content="AI Playgrounds"><meta property="og:description" content="Twelve bilingual, single-file AI interactives built for classroom use and independent exploration."><meta property="og:image" content="https://lmdixon23.github.io/ai-playgrounds/og-image-v2.png"><meta property="og:image:width" content="1200"><meta property="og:image:height" content="630"><meta property="og:image:alt" content="AI Playgrounds: twelve bilingual interactives for foundational artificial intelligence">\n<meta name="twitter:card" content="summary_large_image"><meta name="twitter:title" content="AI Playgrounds"><meta name="twitter:description" content="Twelve bilingual, single-file AI interactives built for classroom use and independent exploration."><meta name="twitter:image" content="https://lmdixon23.github.io/ai-playgrounds/og-image-v2.png">'
          if old not in text:
              raise SystemExit('expected social metadata block not found')
          path.write_text(text.replace(old, new), encoding='utf-8', newline='\n')
          PY

          rm .github/workflows/refresh-social-preview.yml
          python tools/release_check.py

      - name: Commit refreshed preview
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Refresh AI Playgrounds social preview"
          git push
