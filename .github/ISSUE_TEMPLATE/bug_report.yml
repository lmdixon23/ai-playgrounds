name: Bug report
description: Report a reproducible applet or site problem
body:
  - type: input
    id: page
    attributes:
      label: Applet or page
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and observed behavior
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and device
